# Kubernetes manifests for budgeteer
# Apply with: kubectl apply -f k8s/

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: budgeteer
  labels:
    app: budgeteer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: budgeteer
  template:
    metadata:
      labels:
        app: budgeteer
    spec:
      containers:
        - name: budgeteer
          image: ghcr.io/dakotadornbrack/budgeteer:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: budgeteer-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: budgeteer-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: budgeteer
spec:
  selector:
    app: budgeteer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: budgeteer-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: budgeteer
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
